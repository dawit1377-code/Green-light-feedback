<html>
<head>

<title>Green Light Dashboard</title>

<style>

body{

}

.card{

padding:20px;

}

</style>

<body>

<h1>🚦 Green Light Dashboard</h1>

<div class="card">
Total Feedback:

</div>

<div class="card">
Average Rating:
<span id="avgRating">Loading...</span>
</div>

<script>

document.getElementById("totalFeedback").innerText =
"Will connect after API update";

document.getElementById("avgRating").innerText =
"Will connect after API update";

</script>

</body>
</html>
