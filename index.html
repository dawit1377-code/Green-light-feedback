<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Green Light Automotive Center</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f4f4;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#35C7B1;
margin-bottom:20px;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

select,input,textarea{
width:100%;
padding:12px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:15px;
margin-top:20px;
background:#35C7B1;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}
</style>
</head>

<body>

<div class="container">

<h1>🚦 Green Light Automotive Center</h1>

<label>Language</label>
<select id="language">
<option>English</option>
<option>አማርኛ</option>
<option>Afaan Oromo</option>
</select>

<label>Overall Rating</label>
<select id="rating">
<option value="5">⭐⭐⭐⭐⭐ Excellent</option>
<option value="4">⭐⭐⭐⭐ Very Good</option>
<option value="3">⭐⭐⭐ Good</option>
<option value="2">⭐⭐ Fair</option>
<option value="1">⭐ Poor</option>
</select>

<label>Department</label>
<select id="department" onchange="loadEmployees()">
<option value="">Select Department</option>
<option>Mechanical</option>
<option>Electrical</option>
<option>Engine Shop</option>
<option>Car Wash</option>
<option>Security</option>
<option>Customer Service</option>
<option>Finance</option>
</select>

<label>Employee</label>
<select id="employee">
<option value="">Select Employee</option>
</select>

<label>Comment</label>
<textarea id="comment" rows="4"></textarea>

<label>Phone Number (Optional)</label>
<input id="phone">

<label>Plate Number (Optional)</label>
<input id="plate">

<button onclick="submitFeedback()">
Submit Feedback
</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyHxmqkp0w1n905deIqGZtsg_WozeWaHF5qmsQRMd1Ori-hyUngJLyowrIiDPsmucsU/exec";

const employees = {
  "Mechanical":["Chalachew","Mikiyas","Angesom"],
  "Electrical":["Daniel"],
  "Engine Shop":["Chalachew"],
  "Car Wash":["Asebe"],
  "Security":[
    "Ato Tsegaye",
    "Ato Ermiyas",
    "Ato Muluneh",
    "Ato Kassa",
    "Ato Asebe"
  ],
  "Customer Service":["Aberham"],
  "Finance":["Elias"]
};

function loadEmployees(){

  const dept =
  document.getElementById("department").value;

  const emp =
  document.getElementById("employee");

  emp.innerHTML =
  '<option value="">Select Employee</option>';

  if(employees[dept]){

    employees[dept].forEach(name=>{

      const option =
      document.createElement("option");

      option.value = name;
      option.textContent = name;

      emp.appendChild(option);

    });

  }

}

function submitFeedback(){

  const data = {

    language:
    document.getElementById("language").value,

    rating:
    document.getElementById("rating").value,

    department:
    document.getElementById("department").value,

    employee:
    document.getElementById("employee").value,

    comment:
    document.getElementById("comment").value,

    phone:
    document.getElementById("phone").value,

    plate:
    document.getElementById("plate").value

  };

  fetch(API_URL,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify(data)
  });

  alert("Thank you for your feedback!");

  document.getElementById("comment").value="";
  document.getElementById("phone").value="";
  document.getElementById("plate").value="";

}

</script>

</body>
</html>
