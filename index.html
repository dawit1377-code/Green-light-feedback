<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Green Light Automotive Center</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f4f7f7;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:#fff;
padding:25px;
border-radius:15px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}

h1{
text-align:center;
color:#35C7B1;
}

label{
display:block;
margin-top:15px;
font-weight:bold;
}

select,input,textarea{
width:100%;
padding:10px;
margin-top:5px;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

.rating{
display:flex;
gap:10px;
margin-top:10px;
}

.rating button{
width:50px;
height:50px;
border:none;
border-radius:50%;
cursor:pointer;
font-size:18px;
}

.rating button.active{
background:#35C7B1;
color:white;
}

.submit-btn{
width:100%;
margin-top:20px;
padding:15px;
border:none;
border-radius:10px;
background:#35C7B1;
color:white;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>🚦 Green Light Automotive Center</h1>

<label>Language</label>
<select id="language">
<option>English</option>
<option>አማርኛ</option>
<option>Afaan Oromo</option>
</select>

<label>Overall Rating</label>

<div class="rating">
<button type="button" onclick="setRating(1,this)">1</button>
<button type="button" onclick="setRating(2,this)">2</button>
<button type="button" onclick="setRating(3,this)">3</button>
<button type="button" onclick="setRating(4,this)">4</button>
<button type="button" onclick="setRating(5,this)">5</button>
</div>

<label>Department</label>

<select id="department" onchange="loadEmployees()">
<option value="">Select Department</option>
<option>Mechanical</option>
<option>Electrical</option>
<option>Engine Shop</option>
<option>Car Wash</option>
<option>Security</option>
<option>Customer Service</option>
<option>Finance</option>
</select>

<label>Employee</label>

<select id="employee"></select>

<label>Comment</label>
<textarea id="comment" rows="4"></textarea>

<label>Phone Number (Optional)</label>
<input id="phone">

<label>Plate Number (Optional)</label>
<input id="plate">

<button class="submit-btn" onclick="submitFeedback()">
Submit Feedback
</button>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwuQiulpIyMi5kYYLN6yEQdyoZnfnW4imqn6WZT9KxH6XIpF4rdf_HBP5UaVcpHFt1w/exec";

let rating = 0;

function setRating(value,btn){

rating=value;

document
.querySelectorAll(".rating button")
.forEach(b=>b.classList.remove("active"));

btn.classList.add("active");

}

const employees={

"Mechanical":["Chalachew","Mikiyas","Angesom"],

"Electrical":["Daniel"],

"Engine Shop":["Chalachew"],

"Car Wash":["Asebe"],

"Security":[
"Ato Tsegaye",
"Ato Ermiyas",
"Ato Muluneh",
"Ato Kassa",
"Ato Asebe"
],

"Customer Service":["Aberham"],

"Finance":["Elias"]

};

function loadEmployees(){

const dept =
document.getElementById("department").value;

const emp =
document.getElementById("employee");

emp.innerHTML="";

if(employees[dept]){

employees[dept].forEach(name=>{

let option =
document.createElement("option");

option.value=name;
option.textContent=name;

emp.appendChild(option);

});

}

}

function submitFeedback(){

const data={

language:
document.getElementById("language").value,

rating:rating,

department:
document.getElementById("department").value,

employee:
document.getElementById("employee").value,

comment:
document.getElementById("comment").value,

phone:
document.getElementById("phone").value,

plate:
document.getElementById("plate").value

};

fetch(API_URL,{
method:"POST",
mode:"no-cors",
body:JSON.stringify(data)
});

alert("Thank you for your feedback!");

document.getElementById("comment").value="";
document.getElementById("phone").value="";
document.getElementById("plate").value="";

}

</script>

</body>
</html>
```
