<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Green Light Automotive Center</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7f7;
    margin:0;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.logo{
    text-align:center;
}

.logo img{
    max-width:220px;
}

h1{
    color:#35C7B1;
    text-align:center;
}

label{
    display:block;
    margin-top:15px;
    font-weight:bold;
}

select,
textarea,
input{
    width:100%;
    padding:10px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
}

.rating{
    display:flex;
    gap:10px;
    margin-top:10px;
}

.rating button{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    background:#eaeaea;
    cursor:pointer;
    font-size:18px;
}

.rating button.active{
    background:#35C7B1;
    color:white;
}

.submit-btn{
    margin-top:25px;
    width:100%;
    background:#35C7B1;
    color:white;
    border:none;
    padding:15px;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.submit-btn:hover{
    opacity:.9;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">
<!-- replace later with your logo -->
<h2>🚦 Green Light Automotive Center</h2>
</div>

<h1>Customer Feedback</h1>

<label>Language</label>
<select id="language">
<option>English</option>
<option>አማርኛ</option>
<option>Afaan Oromo</option>
</select>

<label>Overall Rating</label>

<div class="rating">
<button onclick="setRating(1)">1</button>
<button onclick="setRating(2)">2</button>
<button onclick="setRating(3)">3</button>
<button onclick="setRating(4)">4</button>
<button onclick="setRating(5)">5</button>
</div>

<label>Department</label>

<select id="department" onchange="loadEmployees()">
<option value="">Select Department</option>
<option>Mechanical</option>
<option>Electrical</option>
<option>Engine Shop</option>
<option>Car Wash</option>
<option>Security</option>
<option>Customer Service</option>
<option>Finance</option>
</select>

<label>Employee</label>

<select id="employee"></select>

<label>Comment</label>
<textarea id="comment" rows="4"></textarea>

<label>Phone Number (Optional)</label>
<input type="text" id="phone">

<label>Plate Number (Optional)</label>
<input type="text" id="plate">

<button class="submit-btn" onclick="submitFeedback()">
Submit Feedback
</button>

</div>

<script>

let rating=0;

function setRating(value){

rating=value;

document
.querySelectorAll(".rating button")
.forEach(btn=>btn.classList.remove("active"));

event.target.classList.add("active");

}

const employees={

"Mechanical":["Chalachew","Mikiyas","Angesom"],

"Electrical":["Daniel"],

"Engine Shop":["Chalachew"],

"Car Wash":["Asebe"],

"Security":[
"Ato Tsegaye",
"Ato Ermiyas",
"Ato Muluneh",
"Ato Kassa",
"Ato Asebe"
],

"Customer Service":["Aberham"],

"Finance":["Elias"]

};

function loadEmployees(){

const dept=
document.getElementById("department").value;

const emp=
document.getElementById("employee");

emp.innerHTML="";

if(employees[dept]){

employees[dept].forEach(name=>{

const option=
document.createElement("option");

option.value=name;

option.textContent=name;

emp.appendChild(option);

});

}

}

async function submitFeedback(){

const data={

language:
document.getElementById("language").value,

rating,

department:
document.getElementById("department").value,

employee:
document.getElementById("employee").value,

comment:
document.getElementById("comment").value,

phone:
document.getElementById("phone").value,

plate:
document.getElementById("plate").value

};

const response=await fetch(
"https://script.google.com/macros/s/AKfycbwl8JgqMhugiqRXsjeItEOAj51eemDe5nkdPGmurSfgpy6sfUbrHVz4PU1RSJafI8rn/exec",
{
method:"POST",
body:JSON.stringify(data)
});

const result=await response.json();

alert("Thank you for your feedback!");

}

</script>

</body>
</html>
